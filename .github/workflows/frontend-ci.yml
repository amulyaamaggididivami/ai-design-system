# ─────────────────────────────────────────────────────────────────────────────
# CI — type-check, lint and build the frontend library on every PR / push
# ─────────────────────────────────────────────────────────────────────────────

name: Frontend Package CI

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  build:
    name: Type-check · Lint · Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: Lint
        run: npm run lint

      - name: Build library
        run: npm run build:lib

      - name: Verify dist artefacts
        run: |
          test -f dist/index.js   && test -f dist/index.cjs && \
          test -f dist/index.d.ts && test -f dist/style.css \
          && echo "✅ Build artefacts OK" || (echo "❌ Missing artefacts" && exit 1)
